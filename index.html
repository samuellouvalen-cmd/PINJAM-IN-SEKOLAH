<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinjam-In Pro v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --success: #22c55e;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { margin: 0; padding: 0; background-color: #111; display: flex; justify-content: center; }

        .app-shell {
            width: 100%; max-width: 414px; height: 100vh;
            background-color: var(--bg); position: relative;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Top Bar */
        .top-bar { padding: 25px 20px 15px; display: flex; justify-content: space-between; align-items: center; }
        .user-profile { display: flex; align-items: center; gap: 12px; }
        .avatar { 
            width: 42px; height: 42px; background: linear-gradient(135deg, var(--primary), #818cf8);
            color: white; border-radius: 14px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
        }

        /* Content Area */
        .main-content { flex: 1; overflow-y: auto; padding: 10px 20px 100px; display: none; }
        .active-page { display: block; }
        .page-title { margin: 10px 0 20px; font-size: 20px; font-weight: 700; color: var(--text-main); }

        /* Cards */
        .item-card, .history-card {
            background: var(--card); padding: 20px; border-radius: 24px;
            margin-bottom: 16px; border: 1px solid #f1f5f9;
        }
        .item-card { display: flex; justify-content: space-between; align-items: flex-start; }

        .tag { font-size: 10px; padding: 5px 12px; border-radius: 10px; font-weight: 700; margin-bottom: 8px; display: inline-block; }
        .available { background: #dcfce7; color: #15803d; }
        .borrowed { background: #fee2e2; color: #b91c1c; }
        .history-tag { background: #f1f5f9; color: #475569; }

        .btn-action { border: none; padding: 12px 18px; border-radius: 14px; font-weight: 700; cursor: pointer; margin-top: 5px; }
        .btn-borrow { background: var(--primary); color: white; }
        .btn-return { background: #f1f5f9; color: var(--text-main); }

        /* Bottom Navigation */
        .bottom-nav {
            position: absolute; bottom: 0; width: 100%; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px); display: flex; justify-content: space-around;
            padding: 15px 0 30px; border-top: 1px solid #f1f5f9;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: var(--text-sub); gap: 5px; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: bold; }

        /* Modal */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; }
        .modal {
            display: none; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 414px; background: white; padding: 20px 25px 30px;
            border-radius: 30px 30px 0 0; z-index: 101; max-height: 85vh; overflow-y: auto;
        }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; margin-bottom: 5px; color: var(--text-sub); font-weight: 600; }
        .input-group input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #f1f5f9; background: #f8fafc; outline: none; }
        .btn-confirm { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-shell">
        <div class="top-bar">
            <div class="user-profile">
                <div class="avatar">S</div>
                <div class="welcome-text">
                    <span>Database Sekolah</span>
                    <strong>Pinjam-In Pro</strong>
                </div>
            </div>
            <div style="font-size: 20px;">🔔</div>
        </div>

        <div id="homePage" class="main-content active-page">
            <h2 class="page-title">Daftar Inventaris</h2>
            <div id="itemList"></div>
        </div>

        <div id="historyPage" class="main-content">
            <h2 class="page-title">Riwayat Pinjam</h2>
            <div id="historyList">
                <p style="text-align: center; color: #999; margin-top: 50px;">Belum ada riwayat.</p>
            </div>
        </div>

        <div id="settingPage" class="main-content">
            <h2 class="page-title">Pengaturan</h2>
            <div style="background:white; padding:20px; border-radius:20px; display:flex; align-items:center; gap:15px; cursor:pointer;" onclick="contactEmergency()">
                <div style="width:40px; height:40px; background:#dcfce7; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px;">📞</div>
                <div>
                    <strong>Kontak Darurat</strong>
                    <small style="display:block; color:#666;">WhatsApp: 0881026200987</small>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchPage('home', this)">🏠<span>Home</span></div>
            <div class="nav-item" onclick="switchPage('history', this)">🕒<span>Riwayat</span></div>
            <div class="nav-item" onclick="switchPage('setting', this)">⚙️<span>Setting</span></div>
        </nav>
    </div>

    <div id="overlay" class="overlay" onclick="closeModal()"></div>
    <div id="modal" class="modal">
        <h3 id="mHeader" style="margin-top:0">Form Peminjaman</h3>
        <div class="input-group"><label>Nama Lengkap</label><input type="text" id="bName"></div>
        <div class="input-group"><label>Kelas</label><input type="text" id="bClass"></div>
        <div class="input-group"><label>NIS</label><input type="number" id="bNis"></div>
        <div class="input-group"><label>WhatsApp</label><input type="tel" id="bPhone"></div>
        <button class="btn-confirm" onclick="confirmLoan()">Konfirmasi Pinjam</button>
    </div>

    <script>
        let db = [
            { id: 1, name: "Kabel HDMI Pro", cat: "Elektronik", status: "Tersedia", user: null, borrowTime: null },
            { id: 2, name: "Bola Basket Wilson", cat: "Olahraga", status: "Tersedia", user: null, borrowTime: null },
            { id: 3, name: "Proyektor Epson", cat: "Elektronik", status: "Tersedia", user: null, borrowTime: null }
        ];

        let historyDb = [];
        let selectedId = null;

        function updateUI() {
            const list = document.getElementById('itemList');
            list.innerHTML = '';

            db.forEach(item => {
                const isAvail = item.status === "Tersedia";
                list.innerHTML += `
                    <div class="item-card">
                        <div style="flex:1">
                            <span class="tag ${isAvail ? 'available' : 'borrowed'}">
                                ${isAvail ? '✓ Tersedia' : '✗ Sedang Dipinjam'}
                            </span>
                            <h4 style="margin:5px 0">${item.name}</h4>
                            <p style="font-size:12px; color:#666; margin-bottom:5px;">${item.cat}</p>
                            ${!isAvail ? `
                                <div style="font-size:11px; color: #b91c1c; background: #fff1f2; padding: 8px; border-radius: 10px; margin-top:10px;">
                                    <b>Peminjam:</b> ${item.user.name} (${item.user.class})<br>
                                    <b>Waktu Pinjam:</b> ${item.borrowTime}
                                </div>
                            ` : ''}
                        </div>
                        <button class="btn-action ${isAvail ? 'btn-borrow' : 'btn-return'}" 
                                onclick="${isAvail ? `openModal(${item.id}, '${item.name}')` : `returnItem(${item.id})`}">
                            ${isAvail ? 'Pinjam' : 'Kembali'}
                        </button>
                    </div>
                `;
            });
        }

        function switchPage(page, el) {
            document.querySelectorAll('.main-content').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(page + 'Page').classList.add('active-page');
            el.classList.add('active');
            if(page === 'history') renderHistory();
        }

        function openModal(id, name) {
            selectedId = id;
            document.getElementById('mHeader').innerText = "Pinjam " + name;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        function confirmLoan() {
            const data = {
                name: document.getElementById('bName').value,
                class: document.getElementById('bClass').value,
                nis: document.getElementById('bNis').value,
                phone: document.getElementById('bPhone').value
            };

            if(!data.name || !data.class || !data.nis || !data.phone) return alert("Lengkapi data!");
            
            const now = new Date();
            const timeString = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) + " WIB";
            
            const idx = db.findIndex(i => i.id === selectedId);
            db[idx].status = "Dipinjam";
            db[idx].user = data;
            db[idx].borrowTime = timeString;
            
            closeModal();
            updateUI();
            ['bName','bClass','bNis','bPhone'].forEach(id => document.getElementById(id).value = '');
        }

        function returnItem(id) {
            const idx = db.findIndex(i => i.id === id);
            const item = db[idx];
            const now = new Date();
            const returnTime = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) + " WIB";
            
            historyDb.unshift({
                name: item.name,
                userName: item.user.name,
                userClass: item.user.class,
                borrowTime: item.borrowTime,
                returnTime: returnTime,
                date: now.toLocaleDateString('id-ID')
            });

            db[idx].status = "Tersedia";
            db[idx].user = null;
            db[idx].borrowTime = null;
            updateUI();
        }

        function renderHistory() {
            const hList = document.getElementById('historyList');
            if(historyDb.length === 0) return;
            hList.innerHTML = '';
            historyDb.forEach(h => {
                hList.innerHTML += `
                    <div class="history-card">
                        <span class="tag history-tag">Selesai</span>
                        <h4 style="margin:5px 0">${h.name}</h4>
                        <p style="font-size:12px">Oleh: <b>${h.userName}</b> (${h.userClass})</p>
                        <div style="margin-top:10px; padding-top:10px; border-top:1px dashed #eee; font-size:11px; color:#666; display:flex; justify-content:space-between;">
                            <span>📅 ${h.date}</span>
                            <span>🕒 ${h.borrowTime} - ${h.returnTime}</span>
                        </div>
                    </div>
                `;
            });
        }

        function contactEmergency() {
            window.open(`https://wa.me/62881026200987?text=Bantuan darurat Pinjam-In`, '_blank');
        }

        window.onload = updateUI;
    </script>
</body>
</html>
